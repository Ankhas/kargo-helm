apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-helm
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - stage: dev
          - stage: staging
          - stage: prod-eu
          - stage: prod-us
  template:
    metadata:
      name: kargo-helm-{{stage}}
      annotations:
        kargo.akuity.io/authorized-stage: kargo-helm:{{stage}}
    spec:
      # project: default
      project: kargo-helm
      source:
        repoURL: https://github.com/ankhas/kargo-helm.git
        # targetRevision: stage/{{stage}}
        path: charts/guestbook
        helm:
          valueFiles:
            - "/env/{{stage}}/values.yaml"
            - "/env/{{stage}}/feature-flags.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: kargo-helm-{{stage}}
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
