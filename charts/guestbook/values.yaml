image:
  repository: ghcr.io/ankhas/guestbook
  pullPolicy: IfNotPresent
  tag: v0.3.0
replicaCount: 1
imagePullSecrets: []
featureFlags: {}
# FEATURE_FOO: enabled

service:
  type: ClusterIP
  port: 80
ingress:
  enabled: false
  className: ""
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
  - host: chart-example.local
    paths:
    - path: /
      pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
podAnnotations: {}
resources: {}
postSyncJob:
  enabled: true
