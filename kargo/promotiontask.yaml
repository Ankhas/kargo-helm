apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: demo-promo-process
  namespace: kargo-helm
spec:
  vars:
    - name: imageRepo
      value: ghcr.io/ankhas/guestbook
    - name: gitopsRepo
      value: https://github.com/ankhas/kargo-helm.git
    - name: branch
      value: main
  steps:
    - uses: git-clone
      config:
        repoURL: ${{ vars.gitopsRepo }}
        checkout:
          - branch: ${{ vars.branch }}
            path: ./out
          # - branch: stage/${{ ctx.stage }}
          #   create: true
          #   path: ./out
    # - uses: git-clear
    #   config:
    #     path: ./out
    - if: ${{ ctx.targetFreight.origin.name == "guestbook" }}
      uses: yaml-update
      as: update-image
      config:
        path: ./out/env/${{ ctx.stage }}/values.yaml
        updates:
          - key: image.tag
            value: ${{ imageFrom( vars.imageRepo ).Tag }}
    - if: ${{ ctx.targetFreight.origin.name == "features" }}
      uses: git-clone
      config:
        repoURL: ${{ vars.gitopsRepo }}
        checkout:
          - commit: ${{ commitFrom( vars.gitopsRepo ).ID }}
            path: ./features
    - if: ${{ ctx.targetFreight.origin.name == "features" }}
      uses: copy
      config:
        inPath: ./features/base/feature-flags.yaml
        outPath: ./out/env/${{ ctx.stage }}/feature-flags.yaml
    - uses: git-commit
      as: commit
      config:
        path: ./out
        message: "${{
          ctx.targetFreight.origin.name == 'guestbook' ?
          'updated '+ctx.stage+' guestbook to '+imageFrom( vars.imageRepo ).Tag :
          'updates '+ctx.stage+' features.yaml from '+commitFrom( vars.gitopsRepo ).ID
          }}"
    - uses: git-push
      config:
        path: ./out
    - uses: argocd-update
      config:
        apps:
          - name: kargo-helm-${{ ctx.stage }}
